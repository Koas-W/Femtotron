# ============================================================
# Femtotron 调试配置: Tiny LLaMA
# ============================================================
# 用法:
#   torchrun --nproc_per_node=8 scripts/train.py --config configs/tiny_llama_debug.yaml
#   torchrun --nproc_per_node=2 scripts/train.py --config configs/tiny_llama_debug.yaml --dp 2 --tp 1

# --- 并行配置 ---
# 不指定时自动推断: dp = world_size / tp, pp = 1
tp: 2
# dp: auto
pp: 1

# --- 模型 ---
# model_name 为空时使用随机初始化的 tiny 模型
model_name: null
hidden_size: 256
intermediate_size: 512
num_attention_heads: 8
num_key_value_heads: 4
num_hidden_layers: 4
max_position_embeddings: 512
vocab_size: 32000
tie_word_embeddings: false
init_std: 0.02

# --- 数据 ---
dataset: "roneneldan/TinyStories"
num_samples: 2000
seq_len: 128
tokenizer: "meta-llama/Llama-2-7b-hf"
data_dir: "./data"
seq_len: 128

# --- 训练 ---
train_steps: 500
micro_batch_size: 4
lr: 3.0e-4
weight_decay: 0.01
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8
grad_clip: 1.0
warmup_steps: 50
min_lr_ratio: 0.1

# --- Logging ---
log_interval: 10

# --- Checkpoint ---
checkpoint_interval: 100
checkpoint_dir: "./checkpoints/tiny_debug"